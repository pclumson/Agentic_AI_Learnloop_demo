version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://learnloop:learnloop@db:5432/learnloop
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=learnloop
      - POSTGRES_USER=learnloop
      - POSTGRES_PASSWORD=learnloop
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery-worker:
    build: .
    command: celery -A learnloop worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://learnloop:learnloop@db:5432/learnloop
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A learnloop beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://learnloop:learnloop@db:5432/learnloop
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
